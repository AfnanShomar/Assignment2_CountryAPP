<!DOCTYPE html>
<html>
<head>
  <title>Countries API App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Countries API App</h1>
    <p>Search for any country and view information using a public API.</p>

    <div class="search-box">
      <input id="countryInput" placeholder="Enter country name">
      
      <button onclick="getCountry()">Search</button>
    </div>

    <div id="result" class="result-box">
      <h2>Search a country</h2>
      <p>Enter a country name above to get started and see information here.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
